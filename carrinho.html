<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Carrinho - Toque de Vênus</title>
</head>

<body>
    <header class="header">
        <section>
            <a href="index.html" class="logo">
                <img src="./img/logo.png" alt="logo">
            </a>

            <nav class="navbar">
                <a href="index.html">Home</a>
                <a href="index.html#about">Sobre</a>
                <a href="index.html#products">Produtos</a>
                <a href="carrinho.html">Carrinho</a>
                <a href="index.html#address">Endereço</a>
            </nav>

            <div class="icons">
                <img width="30" height="30" src="https://img.icons8.com/ios-filled/30/ffffff/search--v2.png"
                    alt="search" />

                <a href="carrinho.html" style="position: relative; display: inline-block;">
                    <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/shopping-cart--v1.png"
                        alt="shopping-cart--v1" />
                </a>
            </div>
        </section>
    </header>

    <section class="carrinho">
        <h2 class="title">Seu <span>Carrinho</span></h2>

        <div id="cart-items" class="cart-container">
            <!-- Itens serão inseridos pelo JavaScript -->
        </div>

        <!-- Mensagem quando carrinho estiver vazio -->
        <div id="empty-cart" class="empty-cart" style="display: none; text-align: center; padding: 4rem;">
            <h3>Seu carrinho está vazio 😕</h3>
            <p>Que tal adicionar alguns produtos lindos?</p>
            <a href="index.html#products" class="btn">Ver Produtos</a>
        </div>

        <div class="cart-total" id="cart-total" style="display: none;">
            <h3>Total: <span id="total-price">R$ 0,00</span></h3>
            <a href="checkout.html" class="btn">Finalizar Compra</a>
            <button onclick="limparCarrinho()" class="btn" style="background: #333; margin-left: 1rem;">Limpar
                Carrinho</button>
        </div>
    </section>

    <section class="footer">
        <div class="share">
            <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/instagram-new.png"
                alt="instagram" />
            <img width="30" height="30" src="https://img.icons8.com/ios-filled/30/ffffff/facebook-new.png"
                alt="facebook" />
            <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/twitter--v1.png"
                alt="twitter" />
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
