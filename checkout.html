<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Checkout - Toque de Vênus</title>
</head>
<body>
    <header class="header">
        <section>
            <a href="index.html" class="logo">
                <img src="./img/logo.png" alt="logo">
            </a>

            <nav class="navbar">
                <a href="index.html">Home</a>
                <a href="index.html#about">Sobre</a>
                <a href="index.html#products">Produtos</a>
                <a href="carrinho.html">Carrinho</a>
                <a href="checkout.html">Checkout</a>
            </nav>
            
            <div class="icons">
                <img width="30" height="30" src="https://img.icons8.com/ios-filled/30/ffffff/search--v2.png" alt="search" />
                <a href="carrinho.html" style="position: relative; display: inline-block;">
                    <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/shopping-cart--v1.png" alt="shopping-cart--v1" />
                </a>
            </div>
        </section>
    </header>

    <section class="checkout" style="padding-top: 120px; padding-bottom: 6rem;">
        <h2 class="title">Finalizar <span>Compra</span></h2>

        <div class="checkout-container">
            
            <!-- Coluna Esquerda: Formulário -->
            <div class="checkout-form">
                <h3>Endereço de Entrega</h3>
                
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" placeholder="Seu nome completo" required>
                </div>

                <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                </div>

                <div class="form-group">
                    <label>CEP</label>
                    <input type="text" id="cep" placeholder="00000-000" maxlength="9">
                </div>

                <div class="form-group">
                    <label>Endereço</label>
                    <input type="text" id="endereco" placeholder="Rua, Avenida...">
                </div>

                <div style="display: flex; gap: 4rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Número</label>
                        <input type="text" id="numero" placeholder="123">
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label>Complemento</label>
                        <input type="text" id="complemento" placeholder="Apartamento, casa...">
                    </div>
                </div>

                <div class="form-group">
                    <label>Cidade</label>
                    <input type="text" id="cidade" value="Teixeira de Freitas" readonly>
                </div>

                <h3 style="margin-top: 3rem;">Forma de Pagamento</h3>
                
                <div class="payment-options">
                    <label class="payment-option">
                        <input type="radio" name="pagamento" value="pix" checked>
                        <span>PIX (Desconto de 5%)</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="pagamento" value="cartao">
                        <span>Cartão de Crédito</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="pagamento" value="boleto">
                        <span>Boleto Bancário</span>
                    </label>
                </div>
            </div>

            <!-- Coluna Direita: Resumo do Pedido -->
            <div class="checkout-resumo">
                <h3>Resumo do Pedido</h3>
                <div id="resumo-itens">
                    <!-- Itens serão inseridos pelo JavaScript -->
                </div>

                <div class="resumo-total">
                    <p>Subtotal: <span id="subtotal">R$ 0,00</span></p>
                    <p>Frete: <span style="color: #4ade80;">Grátis</span></p>
                    <hr>
                    <h3>Total: <span id="total-final">R$ 0,00</span></h3>
                </div>

                <button onclick="finalizarCompra()" class="btn" style="width: 100%; margin-top: 2rem; padding: 1.4rem;">
                    Finalizar Compra
                </button>

                <a href="carrinho.html" style="display: block; text-align: center; margin-top: 1rem; color: #aaa;">
                    ← Voltar para o Carrinho
                </a>
            </div>
        </div>
    </section>

    <section class="footer">
        <div class="share">
            <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/instagram-new.png"
                alt="instagram" />
            <img width="30" height="30" src="https://img.icons8.com/ios-filled/30/ffffff/facebook-new.png"
                alt="facebook" />
            <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/twitter--v1.png"
                alt="twitter" />
        </div>

        <div class="copyright">
            <p>&copy; 2026 Toque de Vênus - Amorim Designer. Todos os direitos reservados.</p>
        </div>
    </section>


    <script src="script.js"></script>
</body>
</html>
